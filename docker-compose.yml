version: '3.8'

services:
db:
  image: postgres:15
  container_name: cnn_postgres_db
  restart: always
  environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: 101105khanhs
    POSTGRES_DB: CNN
  ports:
    - "5432:5432"

web:
  image: ghcr.io/baokhanh546123/api_lungcancer:1.0.0
  build: .
  container_name: cnn_web_app
  restart: always
  ports:
    - "8000:8000"
  environment:
  - DATABASE_URL=postgresql://postgres:101105khanhs@db:5432/CNN
  depends_on:
      - db
  volumes:
    - db_data:/var/lib/postgresql/data